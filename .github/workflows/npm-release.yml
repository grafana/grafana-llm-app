name: NPM Release

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Release a new version of the npm library"
        required: true
        default: false
        type: "boolean"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    environment: Release npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          # Releases should always be made off of 'main'
          ref: "main"
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # npm >=11 is required for Trusted Publishing (OIDC-based auth).
      # npm 10.x --provenance only signs; it doesn't use OIDC for publish auth.
      # We avoid a global install (breaks on Node 22) and use npx at publish time.

      - name: Setup Go environment
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: packages/grafana-llm-app/go.mod
          cache-dependency-path: packages/grafana-llm-app/go.sum

      - name: Install utilities
        run: sudo apt-get install jq

      - name: Install Mage
        uses: magefile/mage-action@35e1490c70b858aec34994e5a0e2546bffba9cca
        with:
          install-only: true

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build:all

      - name: Run frontend tests
        run: npm run test:ci

      - name: Run backend tests
        run: npm run backend:test

      - name: Publish to NPM
        run: |
          cd packages/grafana-llm-frontend
          npx -y npm@^11.5.1 publish --access public --provenance
